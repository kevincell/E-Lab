{% extends "base.html" %}
{% block content %}
<section class="auth-panel wide">
  <h1>{{ title }}</h1>
  <form method="post" class="form-grid">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary" type="submit">Save</button>
  </form>
  {% if module %}
    <form method="post" action="{% url 'faculty_module_delete' module.id %}" class="danger-zone" onsubmit="return confirm('Delete this module and all its questions?');">
      {% csrf_token %}
      <button class="danger-button" type="submit">Delete Module</button>
    </form>
  {% endif %}
</section>
{% endblock %}
