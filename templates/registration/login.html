{% extends "base.html" %}
{% block title %}Login - {{ SITE_NAME }}{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Login</h1>
  <form method="post" class="form-grid">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary" type="submit">Login</button>
  </form>
  <p class="muted">New student? <a href="{% url 'signup' %}">Create an account</a>.</p>
</section>
{% endblock %}
