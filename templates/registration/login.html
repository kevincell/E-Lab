{% extends "base.html" %}
{% block title %}Login - {{ SITE_NAME }}{% endblock %}
{% block content %}
<div style="display:grid;place-items:center;min-height:60vh;padding:20px 0;">
  <section class="auth-panel">
    <div style="text-align:center;margin-bottom:20px;">
      <span style="font-size:36px;font-weight:900;color:var(--primary);letter-spacing:-0.03em;">{{ SITE_NAME }}</span>
      <p class="muted" style="margin-top:6px;">Sign in to continue</p>
    </div>
    <form method="post" class="form-grid">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="primary" type="submit">Sign In</button>
    </form>
    <p class="muted" style="text-align:center;margin-top:16px;">New student? <a href="{% url 'signup' %}">Create an account</a></p>
  </section>
</div>
{% endblock %}
