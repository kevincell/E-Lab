{% extends "base.html" %}
{% load static %}
{% block title %}Login - Dept. of Computer and Communication{% endblock %}
{% block content %}
<div style="display:grid;place-items:center;min-height:60vh;padding:20px 0;">
  <section class="auth-panel" style="max-width: 440px;">
    <div style="text-align:center;margin-bottom:24px;display:flex;flex-direction:column;align-items:center;gap:12px;">
      <img src="{% static 'img/nitte_logo.png' %}" alt="NITTE Logo" class="brand-logo" style="height: 54px; width: auto; object-fit: contain;">
      <span class="auth-brand-text">Dept. of Computer and Communication</span>
      <p class="muted" style="margin:0;font-size:14px;">CCE e-Lab Portal · Sign in to continue</p>
    </div>
    <form method="post" class="form-grid">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="primary" type="submit">Sign In</button>
    </form>
    <p class="muted" style="text-align:center;margin-top:16px;">New student? <a href="{% url 'signup' %}">Create an account</a></p>
  </section>
</div>
{% endblock %}
