services:
  app:
    build: .
    container_name: elab-app
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file: .env
    volumes:
      - .:/app
      - media:/app/media
      - staticfiles:/app/staticfiles
    depends_on:
      - elab-db
      - elab-redis
      - judge0-server

  worker:
    build: .
    container_name: elab-worker
    restart: always
    command: celery -A config worker -l info
    env_file: .env
    volumes:
      - .:/app
      - media:/app/media
    depends_on:
      - app
      - elab-redis
      - judge0-server

  nginx:
    image: nginx:1.27-alpine
    container_name: elab-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/var/www/static:ro
      - media:/var/www/media:ro
    depends_on:
      - app

  elab-db:
    image: postgres:15-alpine
    container_name: elab-db
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  elab-redis:
    image: redis:7-alpine
    container_name: elab-redis
    restart: always

  judge0-server:
    image: judge0/judge0:latest
    container_name: judge0-server
    restart: always
    privileged: true
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: ${JUDGE0_POSTGRES_DB}
      POSTGRES_USER: ${JUDGE0_POSTGRES_USER}
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      ENABLE_WAIT_RESULT: "true"
      ALLOW_ENABLE_NETWORK: "false"
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-worker:
    image: judge0/judge0:latest
    container_name: judge0-worker
    restart: always
    command: ["./scripts/workers"]
    privileged: true
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: ${JUDGE0_POSTGRES_DB}
      POSTGRES_USER: ${JUDGE0_POSTGRES_USER}
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      ENABLE_WAIT_RESULT: "true"
      ALLOW_ENABLE_NETWORK: "false"
    depends_on:
      - judge0-server

  judge0-db:
    image: postgres:13-alpine
    container_name: judge0-db
    restart: always
    environment:
      POSTGRES_DB: ${JUDGE0_POSTGRES_DB}
      POSTGRES_USER: ${JUDGE0_POSTGRES_USER}
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    volumes:
      - judge0-postgres:/var/lib/postgresql/data

  judge0-redis:
    image: redis:6-alpine
    container_name: judge0-redis
    restart: always
    command: ["redis-server", "--appendonly", "no", "--requirepass", "${JUDGE0_REDIS_PASSWORD}"]

volumes:
  postgres-data:
  judge0-postgres:
  staticfiles:
  media:
